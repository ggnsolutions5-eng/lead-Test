<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GGN Solutions Inc. - Worker Accommodations</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <h1 id="company-name">GGN Solutions Inc.</h1>
    <p id="project-name">Worker Accommodation Directory</p>
  </header>

  <main>
    <section class="intro">
      <p id="intro-text">Loading...</p>
    </section>

    <nav class="category-nav" id="category-nav"></nav>

    <div id="listings-container"></div>

    <section class="contact-section" id="contact">
      <h2>Have a Complaint or Issue?</h2>
      <p>If you have a problem with your accommodation, let us know and we'll respond as soon as possible.</p>
      <form id="contact-form" action="https://formspree.io/f/mpqejrnj" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" required />

        <label for="property">Which Property?</label>
        <input type="text" id="property" name="property" placeholder="e.g. Blackstone Lodge & Suites" />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send</button>
        <p id="contact-status"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> GGN Solutions Inc. All accommodation bookings are made directly with the listed providers.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
